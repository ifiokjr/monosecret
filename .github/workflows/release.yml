name: release

on:
  push:
    tags:
      - "monosecret/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example monosecret/v0.1.0). Must start with monosecret/v."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  upload_assets:
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    if: >-
      (github.repository_owner == 'ifiokjr' || github.repository_owner == 'monosecret') &&
      startsWith(inputs.tag || github.ref_name, 'monosecret/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: checkout current workflow ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: checkout release asset ref
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force origin "+refs/heads/*:refs/remotes/origin/*"
          git fetch --tags --force origin "+refs/tags/*:refs/tags/*"
          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            git checkout --detach "refs/tags/$RELEASE_TAG"
          else
            echo "::error::Release ref '$RELEASE_TAG' is not a valid tag. Releases must be created from tags." >&2
            exit 1
          fi
      - name: verify checkout matches release tag
        shell: bash
        run: |
          set -euo pipefail
          actual_commit=$(git rev-parse HEAD)
          tag_commit=$(git rev-list -n1 "$RELEASE_TAG")
          if [ "$actual_commit" != "$tag_commit" ]; then
            echo "::error::Checked-out commit $actual_commit does not match tag $RELEASE_TAG ($tag_commit)" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$actual_commit" refs/remotes/origin/main 2>/dev/null; then
            echo "::error::Tag $RELEASE_TAG ($actual_commit) is not on main" >&2
            exit 1
          fi
      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: setup cross toolchain
        if: startsWith(matrix.os, 'ubuntu') && !contains(matrix.target, '-musl')
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      - name: install cross
        if: contains(matrix.target, '-musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: set static crt linkage
        if: endsWith(matrix.target, 'windows-msvc')
        shell: bash
        run: echo "RUSTFLAGS=${RUSTFLAGS:-} -C target-feature=+crt-static" >> "$GITHUB_ENV"
      - name: derive release asset tag
        id: release_vars
        shell: bash
        run: |
          set -euo pipefail
          echo "asset_tag=${RELEASE_TAG//\//-}" >> "$GITHUB_OUTPUT"
      - name: upload binaries
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: monosecret
          manifest-path: monosecret/Cargo.toml
          profile: release
          ref: refs/tags/${{ env.RELEASE_TAG }}
          archive: monosecret-$target-${{ steps.release_vars.outputs.asset_tag }}
          target: ${{ matrix.target }}
          tar: all
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
          checksum: sha256,sha512

  attest_assets:
    if: >-
      (github.repository_owner == 'ifiokjr' || github.repository_owner == 'monosecret') &&
      startsWith(inputs.tag || github.ref_name, 'monosecret/v')
    needs: upload_assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: download all release archives for attestation
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          asset_dir="$RUNNER_TEMP/release-asset-attestations"
          mkdir -p "$asset_dir"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'monosecret-*' \
            --dir "$asset_dir"
          shopt -s nullglob
          archives=("$asset_dir"/*)
          if [ ${#archives[@]} -eq 0 ]; then
            echo "::error::No release archives downloaded for $RELEASE_TAG" >&2
            exit 1
          fi
          sha256sum "$asset_dir"/*
      - name: attest all release archives
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ runner.temp }}/release-asset-attestations/*
      - name: verify all release archive attestations
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for archive in "$RUNNER_TEMP/release-asset-attestations"/*; do
            verified=false
            for attempt in 1 2 3 4 5; do
              if gh attestation verify "$archive" --repo "$GITHUB_REPOSITORY"; then
                verified=true
                break
              fi
              echo "Attestation for $archive is not available yet (attempt $attempt/5)."
              sleep 10
            done
            if [ "$verified" != true ]; then
              echo "::error::Failed to verify attestation for $archive" >&2
              exit 1
            fi
          done

  publish_draft:
    needs: attest_assets
    environment: publisher
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    permissions:
      contents: write
    if: >-
      (github.repository_owner == 'ifiokjr' || github.repository_owner == 'monosecret') &&
      startsWith(inputs.tag || github.ref_name, 'monosecret/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: publish draft release
        run: gh release edit "$RELEASE_TAG" --draft=false --latest --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}

  trigger_publish:
    needs: publish_draft
    environment: publisher
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    permissions:
      actions: write
    if: >-
      (github.repository_owner == 'ifiokjr' || github.repository_owner == 'monosecret') &&
      startsWith(inputs.tag || github.ref_name, 'monosecret/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: trigger publish workflow
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            if git ls-remote --exit-code --tags "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
              break
            fi
            echo "Release tag ${RELEASE_TAG} is not visible yet (attempt $attempt/12)."
            sleep 5
          done
          gh workflow run publish.yml \
            --repo "${{ github.repository }}" \
            --ref "$RELEASE_TAG" \
            -f "tag=$RELEASE_TAG"
        env:
          GH_TOKEN: ${{ github.token }}
