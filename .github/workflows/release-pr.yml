name: release-pr

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    if: github.repository_owner == 'ifiokjr' || github.repository_owner == 'monosecret'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: plan release
        run: monochange plan
        shell: devenv shell -- bash -e {0}
      - name: version packages
        run: monochange version
        shell: devenv shell -- bash -e {0}
      - name: create release pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/monochange-release
          delete-branch: true
          commit-message: "chore(release): version packages"
          title: "chore(release): version packages"
          body: |
            This PR was generated by monochange.

            Merge it to create release records and tags for packages with pending changesets.
          labels: release
