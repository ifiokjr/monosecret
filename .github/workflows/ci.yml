name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  security:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: run zizmor
        uses: zizmorcore/zizmor-action@v0.5.3
        with:
          inputs: ".github/workflows/ .github/actions/"
          advanced-security: true

  lint:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: rustfmt
        run: rustup run nightly cargo fmt --all -- --check
        shell: devenv shell -- bash -e {0}
      - name: dprint
        run: dprint check
        shell: devenv shell -- bash -e {0}
      - name: taplo
        run: git ls-files -z '*.toml' | xargs -0 taplo fmt --check
        shell: devenv shell -- bash -e {0}
      - name: dart format
        run: dart format --output=none --set-exit-if-changed packages/monosecret
        shell: devenv shell -- bash -e {0}
      - name: clippy
        run: cargo clippy --all-targets --all-features --locked
        shell: devenv shell -- bash -e {0}
      - name: dart analyze
        run: cd packages/monosecret && dart analyze
        shell: devenv shell -- bash -e {0}
      - name: validate monochange configuration
        run: monochange step:validate
        shell: devenv shell -- bash -e {0}

  test:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          free-runner-space: ${{ runner.os == 'Linux' && 'true' || 'false' }}
      - name: rust tests
        run: cargo test --all --all-features --locked
        shell: devenv shell -- bash -e {0}
      - name: dart tests
        run: cd packages/monosecret && dart test
        shell: devenv shell -- bash -e {0}

  build:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: setup devenv
        if: runner.os != 'Windows'
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          free-runner-space: ${{ runner.os == 'Linux' && 'true' || 'false' }}
      - name: setup rust on windows
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
      - name: build on unix
        if: runner.os != 'Windows'
        run: cargo build --workspace --all-features --locked
        shell: devenv shell -- bash -e {0}
      - name: build on windows
        if: runner.os == 'Windows'
        run: cargo build --workspace --all-features --locked

  packaging:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: cargo package dry-run
        run: cargo package -p monosecret -p monosecret_derive --allow-dirty --locked
        shell: devenv shell -- bash -e {0}
      - name: npm package dry-run
        run: |
          for package in packages/monosecret__cli packages/monosecret__skill packages/monosecret__cli-*; do
            npm --prefix "$package" pack --dry-run
          done
        shell: devenv shell -- bash -e {0}
      - name: dart publish dry-run
        run: cd packages/monosecret && dart pub publish --dry-run
        shell: devenv shell -- bash -e {0}

  coverage:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup
        uses: ./.github/actions/devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          free-runner-space: "true"
      - name: rust coverage
        run: |
          mkdir -p coverage
          rustup run nightly cargo llvm-cov --all-features --workspace --lcov --no-cfg-coverage-nightly --output-path coverage/rust.lcov
        shell: devenv shell -- bash -e {0}
      - name: dart coverage
        run: |
          cd packages/monosecret
          dart pub global activate coverage
          dart test --coverage=coverage
          dart pub global run coverage:format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --package=. \
            --report-on=lib
        shell: devenv shell -- bash -e {0}
      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/rust.lcov
            packages/monosecret/coverage/lcov.info
          if-no-files-found: error
          retention-days: 7
      - name: upload coverage to codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/rust.lcov,./packages/monosecret/coverage/lcov.info
          disable_search: true
          fail_ci_if_error: false
          name: monosecret-workspace
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true
          verbose: true
