# :schema ./docs/src/schemas/monochange.schema.json

[defaults]
parent_bump = "patch"
include_private = false
warn_on_group_mismatch = true
package_type = "cargo"
changelog = false

[changelog.sections]
breaking = { heading = "Breaking", priority = 10 }
feat = { heading = "Features", priority = 20 }
fix = { heading = "Fixes", priority = 30 }
docs = { heading = "Documentation", priority = 40 }
other = { heading = "Other", priority = 50 }

[changelog.types]
major = { bump = "major", section = "breaking" }
breaking = { bump = "major", section = "breaking" }
feat = { bump = "minor", section = "feat" }
fix = { bump = "patch", section = "fix" }
docs = { bump = "none", section = "docs" }
none = { bump = "none", section = "other" }

[source]
provider = "github"
owner = "ifiokjr"
repo = "monosecret"

[package."rust:monosecret"]
path = "monosecret"

[package."rust:monosecret_derive"]
path = "monosecret_derive"

[package."@monosecret/cli"]
type = "npm"
path = "packages/monosecret__cli"
tag = true
release = false

[package."@monosecret/client"]
type = "npm"
path = "packages/monosecret__client"
tag = true
release = false

[package."@monosecret/skill"]
type = "npm"
path = "packages/monosecret__skill"
tag = true
release = false

[package."@monosecret/cli-darwin-arm64"]
type = "npm"
path = "packages/monosecret__cli-darwin-arm64"
tag = true
release = false

[package."@monosecret/cli-darwin-x64"]
type = "npm"
path = "packages/monosecret__cli-darwin-x64"
changelog = false
tag = false
release = false

[package."@monosecret/cli-linux-arm64-gnu"]
type = "npm"
path = "packages/monosecret__cli-linux-arm64-gnu"
changelog = false
tag = false
release = false

[package."@monosecret/cli-linux-arm64-musl"]
type = "npm"
path = "packages/monosecret__cli-linux-arm64-musl"
changelog = false
tag = false
release = false

[package."@monosecret/cli-linux-x64-gnu"]
type = "npm"
path = "packages/monosecret__cli-linux-x64-gnu"
changelog = false
tag = false
release = false

[package."@monosecret/cli-linux-x64-musl"]
type = "npm"
path = "packages/monosecret__cli-linux-x64-musl"
changelog = false

[package."@monosecret/cli-win32-arm64-msvc"]
type = "npm"
path = "packages/monosecret__cli-win32-arm64-msvc"
changelog = false
tag = false
release = false

[package."@monosecret/cli-win32-x64-msvc"]
type = "npm"
path = "packages/monosecret__cli-win32-x64-msvc"
changelog = false
tag = false
release = false

[package."dart:monosecret"]
type = "dart"
path = "packages/monosecret"
changelog = false

[group.main]
packages = ["rust:monosecret", "rust:monosecret_derive"]
release = true
tag = true
version_format = "namespaced"
versioned_files = [
  { path = "Cargo.toml", type = "cargo", fields = [
    "workspace.package.version",
  ] },
]

[changesets.affected]
enabled = true
required = true
skip_labels = ["release"]
comment_on_failure = true
changed_paths = ["codecov.yml"]
ignored_paths = [
  "**/tests/**",
  "**/__tests.rs",
  "**/snapshots/**",
  "fixtures/tests/**",
  "crates/*/changelog.md",
  "changelog.md",
  "packages/*/changelog.md",
]
